services:
  pgvector:
    image: ankane/pgvector
    container_name: str-assistant-pgvector
    environment:
      POSTGRES_DB: pgvector
      POSTGRES_USER: pgvector
      POSTGRES_PASSWORD: pgvector
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgvector -d pgvector"]
      interval: 10s
      timeout: 5s
      retries: 5

  str-assistant:
    build:
      context: .
      dockerfile: Containerfile
    container_name: str-assistant
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - AGENT_PORT=8081
      - USE_INMEMORY_SAVER=true
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
    driver: local
